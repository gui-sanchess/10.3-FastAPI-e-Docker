name: CI/CD Pipeline - FastAPI para Azure

on:
  push:
    branches:
      - main # Mude para 'master' se a sua branch principal tiver esse nome

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # MUITO IMPORTANTE: Substitua '10-4' pelo seu usuário real do Docker Hub se necessário
          tags: guilhermediegosanches/10.3-fastapi-e-docker:latest

      - name: 4. Avisar o Azure (Webhook)
        run: |
          curl -X POST "${{ secrets.AZURE_WEBHOOK_URL }}"